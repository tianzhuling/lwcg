<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>老王漫画组-漫画章节列表</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
  h1 { margin-bottom: 1rem; }
  ul { padding-left: 0; }
  li { list-style: none; margin-bottom: 1rem; }
  a { font-weight: bold; font-size: 1.1rem; color: #333; text-decoration: none; }
</style>
</head>
<body>
  <a id="btn-back" href="index.html" style="
  display:block;
  margin:0 auto 24px;
  padding:8px 16px;
  background:#555;
  color:#fff;
  text-decoration:none;
  border-radius:12px;
  text-align:center;
">← 返回首页</a>
  <h1>老王漫画组</h1>
  <h2>LaoWang<br>CartoonGroup</h2>
  <hr>
  <h2>名称:</h2>
  <h1 id="comic-title">漫画章节列表</h1>
  <hr>
  <h2>章节:</h2>
  <ul id="chapter-list"></ul>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabaseUrl = 'https://ukufabnmpevhmonxjmfb.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdWZhYm5tcGV2aG1vbnhqbWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NTgyNjAsImV4cCI6MjA2NjEzNDI2MH0.xtW2AjVHYKvnjPjFqgYHF0iDLVB_KWhDi0MFU0NFKnA';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const params = new URLSearchParams(window.location.search);
    const comicId = params.get('id');

    const comicTitleElem = document.getElementById('comic-title');
    const chapterList = document.getElementById('chapter-list');

    if (!comicId) {
      comicTitleElem.textContent = '无效的漫画ID';
    } else {
      // 先查漫画标题
      supabase
        .from('comics')
        .select('title')
        .eq('id', comicId)
        .single()
        .then(({ data: comic, error }) => {
          if (error || !comic) {
            comicTitleElem.textContent = '未找到该漫画';
          } else {
            comicTitleElem.textContent = comic.title;
          }
        });

      // 查该漫画所有章节，按 order_num 升序
      supabase
        .from('chapters')
        .select('id, title, order_num')
        .eq('comic_id', comicId)
        .order('order_num', { ascending: true })
        .then(({ data: chapters, error }) => {
          if (error || !chapters) {
            chapterList.innerHTML = '<li>加载章节失败</li>';
            return;
          }
          if (chapters.length === 0) {
            chapterList.innerHTML = '<li>暂无章节</li>';
            return;
          }
          chapterList.innerHTML = chapters.map(ch => `
            <li>
              <a href="chapter.html?id=${ch.id}" target="_self">
                ${ch.order_num !== null ? ch.order_num + '. ' : ''}${ch.title}
              </a>
            </li>
          `).join('');
        });
    }
  </script>
</body>
</html>
