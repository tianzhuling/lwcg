<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>邮箱注册+昵称 - Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>用户注册</h1>
  <form id="register-form">
    <input type="email" id="email" placeholder="邮箱" required /><br />
    <input type="password" id="password" placeholder="密码" required /><br />
    <input type="text" id="nickname" placeholder="昵称" required /><br />
    <button type="submit">注册</button>
  </form>

  <div id="message"></div>

  <script>
    const SUPABASE_URL = 'https://xxxxxx.supabase.co'  // 换成你的
    const SUPABASE_ANON_KEY = 'your-anon-key'          // 换成你的

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const form = document.getElementById('register-form')
    const message = document.getElementById('message')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const nickname = document.getElementById('nickname').value

      // 1. 注册账号
      const { data, error } = await supabase.auth.signUp({ email, password })

      if (error) {
        message.textContent = '注册失败: ' + error.message
        message.style.color = 'red'
        return
      }

      // 2. 注册成功后，把昵称写入profiles表
      const userId = data.user.id
      const { error: profileError } = await supabase
        .from('profiles')
        .insert([{ id: userId, nickname }])

      if (profileError) {
        message.textContent = '昵称保存失败: ' + profileError.message
        message.style.color = 'red'
        return
      }

      message.textContent = '注册成功！请去邮箱验证。'
      message.style.color = 'green'
    })
  </script>
</body>
</html>
