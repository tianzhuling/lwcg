<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>漫画上传平台</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 12px;
    }
    input, button {
      padding: 8px;
      margin-top: 4px;
      width: 100%;
    }
    #preview img {
      max-width: 100px;
      margin: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>上传你的漫画</h1>

  <form id="upload-form">
    <label>漫画标题：
      <input type="text" id="comic-title" required>
    </label>

    <label>章节标题：
      <input type="text" id="chapter-title" required>
    </label>

    <label>上传图片（可多选）：
      <input type="file" id="image-file" accept="image/*" multiple required>
    </label>

    <div id="preview"></div>

    <button type="submit">开始上传</button>
  </form>

  <p id="status"></p>

  <!-- 引入 Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // 替换为你自己的 Supabase 项目配置
    const SUPABASE_URL = 'https://ukufabnmpevhmonxjmfb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // 保持私密
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('upload-form');
    const statusEl = document.getElementById('status');
    const preview = document.getElementById('preview');

    // 显示图片预览
    document.getElementById('image-file').addEventListener('change', (e) => {
      preview.innerHTML = '';
      const files = e.target.files;
      for (const file of files) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = '上传中，请稍候...';

      const comicTitle = document.getElementById('comic-title').value.trim();
      const chapterTitle = document.getElementById('chapter-title').value.trim();
      const files = document.getElementById('image-file').files;

      if (!comicTitle || !chapterTitle || files.length === 0) {
        statusEl.textContent = '请填写完整信息并选择图片';
        return;
      }

      // 1. 查找或创建漫画
      const { data: existingComic, error: findError } = await supabase
        .from('comics')
        .select('id')
        .eq('title', comicTitle)
        .maybeSingle();

      if (findError) {
        console.error(findError);
        statusEl.textContent = '查询漫画失败';
        return;
      }

      let comicId;

      if (existingComic) {
        comicId = existingComic.id;
      } else {
        const { data: newComic, error: comicError } = await supabase
          .from('comics')
          .insert([{ title: comicTitle }])
          .select()
          .single();

        if (comicError) {
          console.error(comicError);
          statusEl.textContent = '创建漫画失败';
          return;
        }

        comicId = newComic.id;
      }

      // 2. 创建章节
      const { data: chapter, error: chapterError } = await supabase
        .from('chapters')
        .insert([{ title: chapterTitle, comic_id: comicId }])
        .select()
        .single();

      if (chapterError) {
        console.error(chapterError);
        statusEl.textContent = '创建章节失败';
        return;
      }

      // 3. 上传图片并写入数据库
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const filename = `${crypto.randomUUID()}-${file.name}`;

        // 上传到 Supabase 存储桶（建议桶名不要有空格）
        const { error: uploadError } = await supabase
          .storage
          .from('comics-image') // 建议桶名改成无空格，如 comics-image
          .upload(filename, file);

        if (uploadError) {
          console.error(uploadError);
          continue;
        }

        // 获取公开图片链接
        const { data: publicUrlData } = supabase
          .storage
          .from('comics-image')
          .getPublicUrl(filename);

        // 插入图片记录到 images 表
        await supabase.from('images').insert([{
          chapter_id: chapter.id,
          image_url: publicUrlData.publicUrl,
          order_num: i + 1
        }]);
      }

      statusEl.textContent = '上传成功！';
      form.reset();
      preview.innerHTML = '';
    });
  </script>
</body>
</html>
