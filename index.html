<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老王漫画组-上传平台</title>
  <style>
    :root {
  --main-bg: #f9f9f9;
  --radius: 12px;
  --spacing: 16px;
}

* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  padding: var(--spacing);
  background-color: var(--main-bg);
}

.container {
  max-width: 600px;
  margin: 2rem auto;
  background: white;
  padding: var(--spacing);
  border-radius: var(--radius);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
}

h1, h2 {
  text-align: center;
  font-size: 1.5rem;
  margin-bottom: var(--spacing);
}

label {
  display: block;
  margin-bottom: 1rem;
}

input[type="text"],
input[type="file"],
button {
  width: 100%;
  padding: 0.75rem;
  font-size: 1rem;
  margin-top: 0.5rem;
  border: 1px solid #ccc;
  border-radius: var(--radius);
}

button {
  background-color: #2d89ef;
  color: white;
  border: none;
  margin-top: var(--spacing);
  cursor: pointer;
  transition: background-color 0.2s ease;
}

button:hover {
  background-color: #1b6dcf;
}

#status {
  text-align: center;
  margin-top: var(--spacing);
  font-size: 1rem;
  word-break: break-word;
  padding: 0;
  border-radius: var(--radius);
  transition: background-color 0.3s ease;
}

#preview,
#browse-preview {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 1rem;
  justify-content: center;
}

#preview img,
#browse-preview img {
  width: 100px;
  height: auto;
  border-radius: 6px;
  object-fit: cover;
  border: 1px solid #ccc;
}
  </style>
</head>
<body>
  <!-- 上传模块 -->
  <div class="container">
    <h1>上传你的漫画</h1>
    <form id="upload-form">
      <label>漫画标题：
        <input type="text" id="comic-title" required />
      </label>
      <label>章节标题：
        <input type="text" id="chapter-title" required />
      </label>
      <label>上传图片：
        <input type="file" id="image-file" accept="image/*" multiple required />
      </label>
      <div id="preview"></div>
      <button type="submit">上传</button>
    </form>
    <p id="status"></p>
  </div>

  <!-- 浏览模块 -->
  <div class="container">
    <h2>浏览漫画章节</h2>
    <form id="browse-form">
      <label>漫画标题：
        <input type="text" id="browse-comic-title" required />
      </label>
      <label>章节标题：
        <input type="text" id="browse-chapter-title" required />
      </label>
      <button type="submit">加载图片</button>
    </form>
    <div id="browse-preview"></div>
  </div>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- vConsole 调试工具 -->
  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  <script>new VConsole();</script>

  <script>
    const SUPABASE_URL = 'https://ukufabnmpevhmonxjmfb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdWZhYm5tcGV2aG1vbnhqbWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NTgyNjAsImV4cCI6MjA2NjEzNDI2MH0.xtW2AjVHYKvnjPjFqgYHF0iDLVB_KWhDi0MFU0NFKnA';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
 const form = document.getElementById('upload-form');
    const statusEl = document.getElementById('status');
    const preview = document.getElementById('preview');

    function showStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? 'red' : 'green';
    }

    document.getElementById('image-file').addEventListener('change', (e) => {
      preview.innerHTML = '';
      for (const file of e.target.files) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.style.width = '100px';
        img.style.margin = '5px';
        preview.appendChild(img);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      showStatus('开始上传...');
      const title = document.getElementById('comic-title').value.trim();
      const chapter = document.getElementById('chapter-title').value.trim();
      const files = document.getElementById('image-file').files;

      try {
        let comicId;
        const { data: existingComic } = await supabase
          .from('comics')
          .select('id')
          .eq('title', title)
          .maybeSingle();

        if (existingComic) {
          comicId = existingComic.id;
        } else {
          const { data: newComic } = await supabase
            .from('comics')
            .insert([{ title }])
            .select()
            .single();
          comicId = newComic.id;
        }

        const { data: newChapter } = await supabase
          .from('chapters')
          .insert([{ title: chapter, comic_id: comicId }])
          .select()
          .single();

  for (let i = 0; i < files.length; i++) {
  const file = files[i];
  const filename = `${crypto.randomUUID()}-${file.name}`;

  // ✅ 先执行上传
  const { data: uploadData, error: uploadError } = await supabase
    .storage
    .from('comics-image')
    .upload(filename, file);

  if (uploadError) {
    throw new Error(`上传失败: ${file.name}，错误信息: ${uploadError.message}`);
  }

  // ✅ 再获取 publicUrl
  const { data: urlData } = supabase
    .storage
    .from('comics-image')
    .getPublicUrl(uploadData.path);

  if (!urlData?.publicUrl) {
    throw new Error('无法获取上传后的图片URL');
  }

  await supabase.from('images').insert([{
    chapter_id: newChapter.id,
    image_url: urlData.publicUrl,
    order_num: i + 1
  }]);
            }
        showStatus('上传成功！');
        form.reset();
        preview.innerHTML = '';
      } catch (err) {
        console.error(err);
        showStatus('上传失败：' + err.message, true);
      }
    });

    const browseForm = document.getElementById('browse-form');
    const browsePreview = document.getElementById('browse-preview');

    browseForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      browsePreview.innerHTML = '加载中...';

      const title = document.getElementById('browse-comic-title').value.trim();
      const chapterTitle = document.getElementById('browse-chapter-title').value.trim();

      try {
        const { data: comic } = await supabase
          .from('comics')
          .select('id')
          .eq('title', title)
          .maybeSingle();

        if (!comic) throw new Error('未找到该漫画');

        const { data: chapter } = await supabase
          .from('chapters')
          .select('id')
          .eq('title', chapterTitle)
          .eq('comic_id', comic.id)
          .maybeSingle();

        if (!chapter) throw new Error('未找到该章节');

        const { data: images } = await supabase
          .from('images')
          .select('image_url, order_num')
          .eq('chapter_id', chapter.id)
          .order('order_num', { ascending: true });

        if (!images || images.length === 0) throw new Error('该章节暂无图片');

        browsePreview.innerHTML = '';
        for (const img of images) {
          const image = document.createElement('img');
          image.src = img.image_url;
          browsePreview.appendChild(image);
        }
      } catch (err) {
        console.error(err);
        browsePreview.innerHTML = `<p style="color:red;">错误：${err.message}</p>`;
      }
    });
  </script>
</body>
</html>
