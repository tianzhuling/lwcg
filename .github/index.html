<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>漫画上传平台</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 12px;
    }
    input, button {
      padding: 8px;
      margin-top: 4px;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>上传你的漫画</h1>

  <form id="upload-form">
    <label>漫画标题：
      <input type="text" id="comic-title" required>
    </label>

    <label>章节标题：
      <input type="text" id="chapter-title" required>
    </label>

    <label>上传图片（可多选）：
      <input type="file" id="image-file" accept="image/*" multiple required>
    </label>

    <button type="submit">开始上传</button>
  </form>

  <p id="status"></p>

  <!-- 引入 Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // 替换成你自己的 Supabase 项目配置
    const SUPABASE_URL = 'https://ukufabnmpevhmonxjmfb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdWZhYm5tcGV2aG1vbnhqbWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NTgyNjAsImV4cCI6MjA2NjEzNDI2MH0.xtW2AjVHYKvnjPjFqgYHF0iDLVB_KWhDi0MFU0NFKnA';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('upload-form');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = '上传中，请稍候...';

      const comicTitle = document.getElementById('comic-title').value;
      const chapterTitle = document.getElementById('chapter-title').value;
      const files = document.getElementById('image-file').files;

      if (files.length === 0) {
        statusEl.textContent = '请至少选择一张图片';
        return;
      }

      // 1. 创建漫画
      const { data: comic, error: comicError } = await supabase
        .from('comics')
        .insert([{ title: comicTitle }])
        .select()
        .single();

      if (comicError) {
        console.error(comicError);
        statusEl.textContent = '创建漫画失败';
        return;
      }

      // 2. 创建章节
      const { data: chapter, error: chapterError } = await supabase
        .from('chapters')
        .insert([{ title: chapterTitle, comic_id: comic.id }])
        .select()
        .single();

      if (chapterError) {
        console.error(chapterError);
        statusEl.textContent = '创建章节失败';
        return;
      }

      // 3. 上传图片 + 写入数据库
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const filename = `${crypto.randomUUID()}-${file.name}`;

        const { error: uploadError } = await supabase.storage
          .from('comics image')
          .upload(filename, file);

        if (uploadError) {
          console.error(uploadError);
          continue;
        }

        const { data: publicUrlData } = supabase
          .storage
          .from('comics image')
          .getPublicUrl(filename);

        await supabase.from('images').insert([{
          chapter_id: chapter.id,
          image_url: publicUrlData.publicUrl,
          order_num: i + 1
        }]);
      }

      statusEl.textContent = '上传成功！';
      form.reset();
    });
  </script>
</body>
  </html>
